<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Cantinho do Sabor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --white: #ffffff;
      --gray-light: #f5f5f5;
      --gray-medium: #e0e0e0;
      --gray-dark: #2e2e2e;
      --black: #121212;
      --orange-start: #ff7a00;
      --orange-end: #ff3d00;
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius-card: 16px;
      --radius-full: 9999px;
    }

    body {
      background-color: var(--gray-light);
      color: var(--black);
      line-height: 1.4;
      padding-bottom: 90px;
    }

    /* HERO */
    .hero {
      width: 100%;
      height: 200px;
      background: url('https://i.pinimg.com/736x/15/ac/c8/15acc8b00600f7f49f899cccbb55050d.jpg') center/cover;
      position: relative;
      border-bottom-left-radius: var(--radius-card);
      border-bottom-right-radius: var(--radius-card);
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.2));
      border-radius: inherit;
    }

    .logo-wrapper {
      position: absolute;
      bottom: -48px;
      left: 50%;
      transform: translateX(-50%);
      width: 96px;
      height: 96px;
      border-radius: var(--radius-full);
      border: 4px solid var(--white);
      box-shadow: var(--shadow-md);
      background: white;
      z-index: 5;
    }

    .logo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }

    .store-info {
      margin-top: 56px;
      text-align: center;
      padding: 12px 16px;
      background: var(--white);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm);
      width: calc(100% - 32px);
      margin-left: auto;
      margin-right: auto;
    }

    .store-info h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--orange-start), var(--orange-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .store-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--gray-dark);
    }

    .store-tags span {
      background: var(--gray-light);
      padding: 6px 14px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* CARDÁPIO */
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 16px;
    }

    .category {
      margin-bottom: 32px;
    }

    .category h2 {
      font-size: 1.5rem;
      margin-bottom: 12px;
      padding-left: 8px;
      border-left: 5px solid var(--orange-start);
    }

    .product-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .product-card {
      background: var(--white);
      border-radius: var(--radius-card);
      padding: 12px;
      display: flex;
      gap: 12px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .product-card:active {
      transform: scale(0.99);
      border-color: var(--orange-start);
    }

    .product-img {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      object-fit: cover;
      background: var(--gray-medium);
      flex-shrink: 0;
    }

    .product-info {
      flex: 1;
    }

    .product-info h3 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .product-desc {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 8px;
    }

    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .add-btn {
      background: linear-gradient(135deg, var(--orange-start), var(--orange-end));
      border: none;
      color: white;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(255, 61, 0, 0.2);
      transition: opacity 0.2s;
    }

    .add-btn:active {
      opacity: 0.7;
    }

    /* MODAL PRINCIPAL */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: white;
      width: 92%;
      max-width: 480px;
      max-height: 90vh;
      border-radius: 32px;
      padding: 24px;
      overflow-y: auto;
      box-shadow: var(--shadow-md);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .close-modal {
      font-size: 28px;
      cursor: pointer;
      color: var(--gray-dark);
    }

    .recheio-group {
      margin: 20px 0;
      border: 1px solid var(--gray-medium);
      border-radius: 24px;
      padding: 16px;
    }

    .recheio-group h4 {
      margin-bottom: 12px;
      color: var(--orange-end);
    }

    .recheio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
    }

    .extras-section {
      background: var(--gray-light);
      border-radius: 16px;
      padding: 16px;
      margin: 16px 0;
    }

    .extra-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px dashed var(--gray-medium);
    }

    .extra-item:last-child {
      border-bottom: none;
    }

    .extra-qtd {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .extra-qtd button {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: white;
      font-weight: bold;
      font-size: 1.2rem;
      box-shadow: var(--shadow-sm);
    }

    .modal-footer {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }

    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, var(--orange-start), var(--orange-end));
      border: none;
      color: white;
      font-weight: 700;
      padding: 16px;
      border-radius: 40px;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .btn-secondary {
      background: var(--gray-light);
      border: none;
      padding: 16px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }

    /* CARRINHO DRAWER */
    .cart-drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--white);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.12);
      z-index: 2000;
      transition: transform 0.3s ease;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .cart-drawer.collapsed {
      transform: translateY(calc(100% - 72px));
    }

    .cart-handle {
      padding: 16px;
      text-align: center;
      font-weight: 600;
      background: var(--white);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--gray-medium);
    }

    .cart-items-container {
      overflow-y: auto;
      padding: 16px;
      flex: 1;
    }

    .cart-item {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--gray-light);
    }
    .cart-item-info { flex:1; font-size:0.95rem; }
    .cart-item-actions { display: flex; align-items: center; gap: 8px; }
    .cart-item-actions button {
      background: var(--gray-light);
      border: none;
      width: 30px; height: 30px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1.2rem;
    }

    .cart-total {
      padding: 16px;
      background: var(--gray-light);
      font-weight: 700;
    }
    .checkout-btn {
      background: linear-gradient(135deg, var(--orange-start), var(--orange-end));
      color: white;
      border: none;
      padding: 16px;
      font-size: 1.2rem;
      font-weight: 700;
      width: 100%;
      border-radius: 40px;
      margin-top: 8px;
      cursor: pointer;
    }
    .checkout-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* MODAL PIX */
    .pix-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 4000;
    }
    .pix-content {
      background: white;
      width: 90%;
      max-width: 360px;
      border-radius: 32px;
      padding: 24px;
      text-align: center;
    }
    .pix-code {
      background: var(--gray-light);
      padding: 12px;
      border-radius: 12px;
      font-family: monospace;
      word-break: break-all;
      margin: 16px 0;
    }
    .copy-btn {
      background: var(--black);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
    }

    /* MODAL CHECKOUT */
    .checkout-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3500;
    }
    .checkout-form {
      background: white;
      width: 92%;
      max-width: 480px;
      max-height: 90vh;
      border-radius: 32px;
      padding: 24px;
      overflow-y: auto;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group input, select {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--gray-medium);
      border-radius: 40px;
      font-size: 1rem;
    }
    .payment-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0;
    }
    .payment-options label {
      background: var(--gray-light);
      padding: 10px 16px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #trocoField {
      margin-top: 8px;
      display: none;
    }
    .toast {
      position: fixed;
      bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--black);
      color: white;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 5000;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo-wrapper">
      <img src="https://i.pinimg.com/736x/15/ac/c8/15acc8b00600f7f49f899cccbb55050d.jpg" alt="Cantinho do Sabor">
    </div>
  </div>
  <div class="store-info">
    <h1>Cantinho do Sabor</h1>
    <div class="store-tags">
      <span>🍟 Entrega grátis</span>
      <span>⏱️ 40–50 min</span>
      <span>⭐ 4.9</span>
    </div>
  </div>

  <main class="container" id="cardapio"></main>

  <!-- CARRINHO DRAWER -->
  <div class="cart-drawer collapsed" id="cartDrawer">
    <div class="cart-handle" id="cartHandle">
      <span>🛒 Sacola <span id="itemCount">0</span></span>
      <span id="drawerToggle">▲</span>
    </div>
    <div class="cart-items-container" id="cartItems"></div>
    <div class="cart-total">
      <div>Subtotal: R$ <span id="subtotal">0.00</span></div>
      <div>Total: R$ <span id="total">0.00</span></div>
      <button class="checkout-btn" id="checkoutBtn" disabled>Finalizar pedido</button>
    </div>
  </div>

  <!-- MODAL DINÂMICO DE PRODUTO -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-content" id="modalDynamicContent"></div>
  </div>

  <!-- MODAL PIX -->
  <div class="pix-modal" id="pixModal">
    <div class="pix-content">
      <h3>Pagamento PIX</h3>
      <div class="pix-code">82e5f2e0-772e-46d6-8ec9-3dbcf9b2c54c</div>
      <button class="copy-btn" id="copyPixBtn">Copiar código</button>
    </div>
  </div>

  <!-- MODAL CHECKOUT (DADOS) -->
  <div class="checkout-modal" id="checkoutModal">
    <div class="checkout-form" id="checkoutForm"></div>
  </div>

  <div class="toast" id="toast">Código copiado!</div>

  <script>
    (function() {
      // ---------- BASE DE DADOS ----------
      const recheiosDisponiveis = [
        'Frango', 'Carne', 'Salsicha', 'Mussarela', 'Coalho', 'Milho', 'Azeitona',
        'Cream Cheese', 'Requeijão', 'Cheddar', 'Catupiry', 'Alho Frito', 'Pimenta Calabresa'
      ];

      // Acompanhamentos e Bebidas (extras)
      const acompanhamentos = [
        { nome: 'Batata Ondulada P', preco: 12.50 },
        { nome: 'Batata Ondulada M', preco: 16.50 },
        { nome: 'Batata Palito P', preco: 10.00 },
        { nome: 'Batata Palito M', preco: 14.00 },
        { nome: 'Bolinhas Carne Sol P', preco: 12.00 },
        { nome: 'Bolinhas Carne Sol M', preco: 21.00 },
        { nome: 'Mini Pastéis Pernambucanos (6und)', preco: 9.50 }
      ];

      const bebidas = [
        { nome: 'Batidinha Uva 300ml', preco: 7.50 },
        { nome: 'Batidinha Uva 500ml', preco: 12.50 },
        { nome: 'Batidinha Abacaxi 300ml', preco: 7.50 },
        { nome: 'Batidinha Abacaxi 500ml', preco: 12.50 },
        { nome: 'Batidinha Maracujá 300ml', preco: 9.50 },
        { nome: 'Batidinha Maracujá 500ml', preco: 14.50 },
        { nome: 'Espanhola 300ml', preco: 7.50 },
        { nome: 'Espanhola 500ml', preco: 12.50 },
        { nome: 'Morancujá 300ml', preco: 9.50 },
        { nome: 'Morancujá 500ml', preco: 14.50 }
      ];

      // Cardápio completo (resumido para o modal)
      const produtosBase = [
        { id: 'dueto', nome: 'Dueto Tradicional', preco: 22.50, img: 'https://i.pinimg.com/736x/c6/44/0a/c6440adee5ef7fa7d38f1e6e44f28be5.jpg', categoria: '🔥 Combos', tipo: 'dueto', recheiosObr: ['Frango','Carne','Mussarela','Coalho'] },
        { id: 'classico1', nome: 'Caipira Especial', preco: 17.50, img: 'https://i.pinimg.com/736x/54/f3/3e/54f33e374276eb01904b8a7bfe94081e.jpg', categoria: '🥟 Clássicos', tipo: 'classico' },
        { id: 'classico2', nome: 'O Queridinho', preco: 17.50, img: 'https://i.pinimg.com/736x/0e/ba/e1/0ebae10f386aaf02dda228b58951ce41.jpg', categoria: '🥟 Clássicos', tipo: 'classico' },
        { id: 'pastel2', nome: 'Pastel 2 Recheios', preco: 17.50, img: 'https://i.pinimg.com/736x/01/4e/04/014e04188feecfd5ea2ac209eb3ad09b.jpg', categoria: '🛠 Monte Pastel', tipo: 'montar', minRech:1, maxRech:2 },
        { id: 'pastel3', nome: 'Pastel 3 Recheios', preco: 19.50, img: 'https://i.pinimg.com/736x/01/4e/04/014e04188feecfd5ea2ac209eb3ad09b.jpg', categoria: '🛠 Monte Pastel', tipo: 'montar', minRech:2, maxRech:3 },
        { id: 'pastel4', nome: 'Pastel 4 Recheios', preco: 21.50, img: 'https://i.pinimg.com/736x/01/4e/04/014e04188feecfd5ea2ac209eb3ad09b.jpg', categoria: '🛠 Monte Pastel', tipo: 'montar', minRech:3, maxRech:4 },
        { id: 'cuscuz2', nome: 'Cuscuz 2 Recheios', preco: 16.50, img: 'https://i.pinimg.com/736x/b7/a1/a8/b7a1a8f4f27068bf9ab780cf38434bb0.jpg', categoria: '🌽 Monte Cuscuz', tipo: 'montar', minRech:1, maxRech:2 },
        { id: 'cuscuz3', nome: 'Cuscuz 3 Recheios', preco: 18.50, img: 'https://i.pinimg.com/736x/b7/a1/a8/b7a1a8f4f27068bf9ab780cf38434bb0.jpg', categoria: '🌽 Monte Cuscuz', tipo: 'montar', minRech:2, maxRech:3 },
        { id: 'cuscuz4', nome: 'Cuscuz 4 Recheios', preco: 20.50, img: 'https://i.pinimg.com/736x/b7/a1/a8/b7a1a8f4f27068bf9ab780cf38434bb0.jpg', categoria: '🌽 Monte Cuscuz', tipo: 'montar', minRech:3, maxRech:4 },
        { id: 'tapioca2', nome: 'Tapioca 2 Recheios', preco: 17.00, img: 'https://i.pinimg.com/736x/23/45/4a/23454a1e2d9d8885839c89a71cd90cbf.jpg', categoria: '🫔 Monte Tapioca', tipo: 'montar', minRech:1, maxRech:2 },
        { id: 'tapioca3', nome: 'Tapioca 3 Recheios', preco: 19.00, img: 'https://i.pinimg.com/736x/23/45/4a/23454a1e2d9d8885839c89a71cd90cbf.jpg', categoria: '🫔 Monte Tapioca', tipo: 'montar', minRech:2, maxRech:3 },
        { id: 'tapioca4', nome: 'Tapioca 4 Recheios', preco: 21.00, img: 'https://i.pinimg.com/736x/23/45/4a/23454a1e2d9d8885839c89a71cd90cbf.jpg', categoria: '🫔 Monte Tapioca', tipo: 'montar', minRech:3, maxRech:4 },
        { id: 'mini', nome: 'Mini Pastéis Pernambucanos', preco: 16.50, img: 'https://i.ytimg.com/vi/03C8mGqozSw/hq720.jpg', categoria: '✨ Novidades', tipo: 'classico' }
      ];

      // ---------- ESTADO ----------
      let carrinho = []; // { id, nome, preco, quantidade, recheios?:[], extras:[] }
      let currentModalProd = null;
      let extrasSelecionados = []; // para o modal atual

      // ---------- RENDER CARDÁPIO ----------
      const cardapioEl = document.getElementById('cardapio');
      function renderCardapio() {
        const cats = [...new Set(produtosBase.map(p => p.categoria))];
        cardapioEl.innerHTML = cats.map(cat => {
          const prodCat = produtosBase.filter(p => p.categoria === cat);
          return `
            <div class="category">
              <h2>${cat}</h2>
              <div class="product-grid">
                ${prodCat.map(p => `
                  <div class="product-card" data-id="${p.id}">
                    <img class="product-img" src="${p.img}" loading="lazy">
                    <div class="product-info">
                      <h3>${p.nome}</h3>
                      <div class="product-footer">
                        <span class="price">R$ ${p.preco.toFixed(2)}</span>
                        <button class="add-btn" data-prod-id="${p.id}">+ adicionar</button>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('');
      }
      renderCardapio();

      // ABRIR MODAL DE PRODUTO
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('add-btn')) {
          const prodId = e.target.dataset.prodId;
          const produto = produtosBase.find(p => p.id === prodId);
          if (!produto) return;
          currentModalProd = { ...produto };
          extrasSelecionados = []; // reset
          abrirModalProduto(produto);
        }
      });

      function abrirModalProduto(prod) {
        const modalDiv = document.getElementById('modalDynamicContent');
        let html = `<div class="modal-header"><h2>${prod.nome}</h2><span class="close-modal" onclick="fecharModal()">&times;</span></div>`;
        
        // Área de recheios conforme tipo
        if (prod.tipo === 'dueto') {
          html += `
            <div class="recheio-group">
              <h4>Escolha o Recheio do 1° Pastel!</h4>
              ${prod.recheiosObr.map(r => `<label class="recheio-option"><input type="radio" name="recheio1" value="${r}" required> ${r}</label>`).join('')}
            </div>
            <div class="recheio-group">
              <h4>Escolha o Recheio do 2° Pastel!</h4>
              ${prod.recheiosObr.map(r => `<label class="recheio-option"><input type="radio" name="recheio2" value="${r}" required> ${r}</label>`).join('')}
            </div>
          `;
        } else if (prod.tipo === 'montar') {
          html += `<div class="recheio-group"><h4>Selecione os recheios (mín ${prod.minRech} • máx ${prod.maxRech})</h4>`;
          recheiosDisponiveis.forEach(r => {
            html += `<label class="recheio-option"><input type="checkbox" class="recheio-check" value="${r}"> ${r}</label>`;
          });
          html += `</div>`;
        } else {
          // clássicos, novidades: sem recheio extra
        }

        // EXTRAS: acompanhamentos e bebidas (para grupos definidos)
        if (['dueto', 'classico', 'montar', 'mini'].includes(prod.tipo)) {
          html += `<div class="extras-section"><h4>🍟 Acompanhamentos (opcional)</h4>`;
          acompanhamentos.forEach((ext, idx) => {
            html += `
              <div class="extra-item">
                <span>${ext.nome} - R$ ${ext.preco.toFixed(2)}</span>
                <div class="extra-qtd">
                  <button onclick="alterarExtra(${idx}, 'acomp', -1)">−</button>
                  <span id="qtd-acomp-${idx}">0</span>
                  <button onclick="alterarExtra(${idx}, 'acomp', 1)">+</button>
                </div>
              </div>
            `;
          });
          html += `</div><div class="extras-section"><h4>🥤 Bebidas (opcional)</h4>`;
          bebidas.forEach((ext, idx) => {
            html += `
              <div class="extra-item">
                <span>${ext.nome} - R$ ${ext.preco.toFixed(2)}</span>
                <div class="extra-qtd">
                  <button onclick="alterarExtra(${idx}, 'bebida', -1)">−</button>
                  <span id="qtd-bebida-${idx}">0</span>
                  <button onclick="alterarExtra(${idx}, 'bebida', 1)">+</button>
                </div>
              </div>
            `;
          });
          html += `</div>`;
        }

        html += `<div class="modal-footer"><button class="btn-secondary" onclick="fecharModal()">Cancelar</button><button class="btn-primary" onclick="adicionarAoCarrinho()">Adicionar à sacola</button></div>`;
        modalDiv.innerHTML = html;
        document.getElementById('productModal').style.display = 'flex';

        // expõe funções auxiliares
        window.fecharModal = () => document.getElementById('productModal').style.display = 'none';
        window.alterarExtra = (idx, tipo, delta) => {
          const span = document.getElementById(`qtd-${tipo}-${idx}`);
          let val = parseInt(span.innerText) + delta;
          if (val < 0) val = 0;
          span.innerText = val;
          // armazena em extrasSelecionados
          const lista = tipo === 'acomp' ? acompanhamentos : bebidas;
          const item = lista[idx];
          const existing = extrasSelecionados.find(e => e.nome === item.nome && e.tipo === tipo);
          if (existing) existing.qtd = val;
          else extrasSelecionados.push({ nome: item.nome, preco: item.preco, qtd: val, tipo });
          if (val === 0) {
            const index = extrasSelecionados.findIndex(e => e.nome === item.nome && e.tipo === tipo);
            if (index !== -1) extrasSelecionados.splice(index, 1);
          }
        };
        window.adicionarAoCarrinho = () => {
          // validações
          if (prod.tipo === 'dueto') {
            const r1 = document.querySelector('input[name="recheio1"]:checked');
            const r2 = document.querySelector('input[name="recheio2"]:checked');
            if (!r1 || !r2) { alert('Escolha os dois recheios!'); return; }
          }
          if (prod.tipo === 'montar') {
            const checks = document.querySelectorAll('.recheio-check:checked');
            if (checks.length < prod.minRech || checks.length > prod.maxRech) {
              alert(`Selecione entre ${prod.minRech} e ${prod.maxRech} recheios.`);
              return;
            }
          }

          // montar objeto do carrinho
          const itemCarrinho = {
            id: prod.id + Date.now(),
            nome: prod.nome,
            preco: prod.preco,
            quantidade: 1,
            recheios: [],
            extras: extrasSelecionados.filter(e => e.qtd > 0)
          };

          if (prod.tipo === 'dueto') {
            const r1 = document.querySelector('input[name="recheio1"]:checked').value;
            const r2 = document.querySelector('input[name="recheio2"]:checked').value;
            itemCarrinho.recheios = [r1, r2];
            itemCarrinho.nome += ` (${r1} + ${r2})`;
          }
          if (prod.tipo === 'montar') {
            const checks = document.querySelectorAll('.recheio-check:checked');
            itemCarrinho.recheios = Array.from(checks).map(c => c.value);
          }

          carrinho.push(itemCarrinho);
          atualizarCarrinhoUI();
          fecharModal();
        };
      }

      // ---------- CARRINHO ----------
      function atualizarCarrinhoUI() {
        const container = document.getElementById('cartItems');
        const itemCount = carrinho.reduce((acc, i) => acc + i.quantidade, 0);
        document.getElementById('itemCount').innerText = itemCount;
        let subtotal = carrinho.reduce((acc, i) => acc + (i.preco * i.quantidade), 0);
        // soma extras
        carrinho.forEach(item => {
          if (item.extras) item.extras.forEach(e => subtotal += e.preco * e.qtd);
        });
        document.getElementById('subtotal').innerText = subtotal.toFixed(2);
        document.getElementById('total').innerText = subtotal.toFixed(2);
        document.getElementById('checkoutBtn').disabled = carrinho.length === 0;

        if (carrinho.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:#999;">Sua sacola está vazia</p>';
        } else {
          container.innerHTML = carrinho.map((item, idx) => `
            <div class="cart-item">
              <div class="cart-item-info">
                <strong>${item.nome}</strong> R$ ${item.preco.toFixed(2)}<br>
                ${item.recheios ? `Recheios: ${item.recheios.join(', ')}` : ''}
                ${item.extras && item.extras.length ? `<br>Extras: ${item.extras.map(e => `${e.nome} x${e.qtd}`).join(', ')}` : ''}
              </div>
              <div class="cart-item-actions">
                <button onclick="alterarQtd(${idx}, -1)">−</button>
                <span>${item.quantidade}</span>
                <button onclick="alterarQtd(${idx}, 1)">+</button>
                <button onclick="removerItem(${idx})" style="background:none;">🗑️</button>
              </div>
            </div>
          `).join('');
        }
      }

      window.alterarQtd = (idx, delta) => {
        const novo = carrinho[idx].quantidade + delta;
        if (novo <= 0) carrinho.splice(idx, 1);
        else carrinho[idx].quantidade = novo;
        atualizarCarrinhoUI();
      };
      window.removerItem = (idx) => {
        carrinho.splice(idx, 1);
        atualizarCarrinhoUI();
      };

      // DRAWER
      document.getElementById('cartHandle').addEventListener('click', () => {
        const drawer = document.getElementById('cartDrawer');
        drawer.classList.toggle('collapsed');
        document.getElementById('drawerToggle').innerText = drawer.classList.contains('collapsed') ? '▲' : '▼';
      });

      // ---------- CHECKOUT ----------
      document.getElementById('checkoutBtn').addEventListener('click', () => {
        if (carrinho.length === 0) return;
        // abre modal de checkout
        const modal = document.getElementById('checkoutModal');
        const formDiv = document.getElementById('checkoutForm');
        formDiv.innerHTML = `
          <h3 style="margin-bottom:16px;">Finalizar pedido</h3>
          <div class="form-group"><input type="text" id="nomeCliente" placeholder="Nome completo" required></div>
          <div class="form-group"><input type="text" id="endereco" placeholder="Rua / Logradouro" required></div>
          <div class="form-group"><input type="text" id="numeroRes" placeholder="Número da residência" required></div>
          <div class="form-group"><input type="text" id="bairro" placeholder="Bairro" required></div>
          <div class="form-group"><input type="text" id="referencia" placeholder="Ponto de referência"></div>
          <div class="payment-options">
            <label><input type="radio" name="pagamento" value="Pix" checked> Pix</label>
            <label><input type="radio" name="pagamento" value="Dinheiro"> Dinheiro</label>
            <label><input type="radio" name="pagamento" value="Débito"> Débito</label>
            <label><input type="radio" name="pagamento" value="Crédito"> Crédito</label>
          </div>
          <div id="trocoField" style="display:none;"><input type="text" id="troco" placeholder="Troco para quanto?"></div>
          <div style="margin-top:24px;"><button class="btn-primary" id="confirmarPedido">Confirmar pedido</button></div>
        `;
        modal.style.display = 'flex';

        document.getElementById('confirmarPedido').addEventListener('click', () => {
          const nome = document.getElementById('nomeCliente').value.trim();
          const endereco = document.getElementById('endereco').value.trim();
          const numero = document.getElementById('numeroRes').value.trim();
          const bairro = document.getElementById('bairro').value.trim();
          const ref = document.getElementById('referencia').value.trim();
          const pagto = document.querySelector('input[name="pagamento"]:checked').value;
          let trocoInfo = '';
          if (pagto === 'Dinheiro') {
            const troco = document.getElementById('troco').value.trim();
            trocoInfo = troco ? `Troco para R$ ${troco}` : 'Sem troco';
          }

          if (!nome || !endereco || !numero || !bairro) {
            alert('Preencha todos os campos obrigatórios'); return;
          }

          // cálculo total
          let total = carrinho.reduce((acc,i) => acc + i.preco*i.quantidade,0);
          carrinho.forEach(i => i.extras?.forEach(e => total += e.preco * e.qtd));
          if (pagto === 'Crédito' || pagto === 'Débito') total *= 1.015; // +1.5%

          // montar mensagem
          let msg = `🛍️ NOVO PEDIDO!%0A`;
          msg += `Cliente: ${nome}%0A`;
          msg += `Endereço: ${endereco}%0A`;
          msg += `Número da Residência: ${numero}%0A`;
          msg += `Ponto de Referência: ${ref}%0A`;
          msg += `Forma de Pagamento: ${pagto} ${trocoInfo}%0A`;
          msg += `ITENS:%0A`;
          carrinho.forEach(item => {
            msg += `° ${item.quantidade}x ${item.nome}, R$ ${item.preco.toFixed(2)}%0A`;
            if (item.recheios?.length) msg += `   Recheios: ${item.recheios.join(', ')}%0A`;
            if (item.extras?.length) item.extras.forEach(e => msg += `   + ${e.nome} x${e.qtd}%0A`);
          });
          msg += `TOTAL: R$ ${total.toFixed(2)}%0A`;

          if (pagto === 'Pix') {
            document.getElementById('checkoutModal').style.display = 'none';
            document.getElementById('pixModal').style.display = 'flex';
            window.urlWhats = `https://wa.me/5587933009283?text=${encodeURIComponent(msg.replace(/%0A/g, '\n'))}`;
          } else {
            window.open(`https://wa.me/5587933009283?text=${encodeURIComponent(msg.replace(/%0A/g, '\n'))}`, '_blank');
            document.getElementById('checkoutModal').style.display = 'none';
          }
        });

        // mostra campo troco se dinheiro
        document.querySelectorAll('input[name="pagamento"]').forEach(r => {
          r.addEventListener('change', (e) => {
            document.getElementById('trocoField').style.display = e.target.value === 'Dinheiro' ? 'block' : 'none';
          });
        });
      });

      // PIX modal
      document.getElementById('copyPixBtn').addEventListener('click', () => {
        navigator.clipboard.writeText('82e5f2e0-772e-46d6-8ec9-3dbcf9b2c54c');
        document.getElementById('toast').style.opacity = 1;
        setTimeout(() => document.getElementById('toast').style.opacity = 0, 1500);
        if (window.urlWhats) window.open(window.urlWhats, '_blank');
        document.getElementById('pixModal').style.display = 'none';
      });

      window.addEventListener('click', (e) => {
        if (e.target.classList.contains('modal-overlay')) e.target.style.display = 'none';
        if (e.target.classList.contains('checkout-modal')) e.target.style.display = 'none';
        if (e.target.classList.contains('pix-modal')) e.target.style.display = 'none';
      });

      atualizarCarrinhoUI();
    })();
  </script>
</body>
</html>
