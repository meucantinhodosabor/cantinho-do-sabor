<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Cantinho do Sabor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --white: #ffffff;
      --gray-light: #f5f5f5;
      --gray-medium: #e0e0e0;
      --gray-dark: #2e2e2e;
      --black: #121212;
      --orange-start: #ff7a00;
      --orange-end: #ff3d00;
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius-card: 16px;
      --radius-full: 9999px;
    }

    body {
      background-color: var(--gray-light);
      color: var(--black);
      line-height: 1.4;
      padding-bottom: 90px;
    }

    /* HERO */
    .hero {
      width: 100%;
      height: 200px;
      background: url('https://i.pinimg.com/736x/15/ac/c8/15acc8b00600f7f49f899cccbb55050d.jpg') center/cover;
      position: relative;
      border-bottom-left-radius: var(--radius-card);
      border-bottom-right-radius: var(--radius-card);
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.2));
      border-radius: inherit;
    }

    .logo-wrapper {
      position: absolute;
      bottom: -48px;
      left: 50%;
      transform: translateX(-50%);
      width: 96px;
      height: 96px;
      border-radius: var(--radius-full);
      border: 4px solid var(--white);
      box-shadow: var(--shadow-md);
      background: white;
      z-index: 5;
    }

    .logo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }

    .store-info {
      margin-top: 56px;
      text-align: center;
      padding: 12px 16px;
      background: var(--white);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm);
      width: calc(100% - 32px);
      margin-left: auto;
      margin-right: auto;
    }

    .store-info h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--orange-start), var(--orange-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .store-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--gray-dark);
    }

    .store-tags span {
      background: var(--gray-light);
      padding: 6px 14px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* CARDÁPIO */
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 16px;
    }

    .category {
      margin-bottom: 32px;
    }

    .category h2 {
      font-size: 1.5rem;
      margin-bottom: 12px;
      padding-left: 8px;
      border-left: 5px solid var(--orange-start);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category h2 img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      object-fit: cover;
    }

    .product-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .product-card {
      background: var(--white);
      border-radius: var(--radius-card);
      padding: 12px;
      display: flex;
      gap: 12px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .product-card:active {
      transform: scale(0.99);
      border-color: var(--orange-start);
    }

    .product-img {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      object-fit: cover;
      background: var(--gray-medium);
      flex-shrink: 0;
    }

    .product-info {
      flex: 1;
    }

    .product-info h3 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .product-desc {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 8px;
    }

    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .add-btn {
      background: linear-gradient(135deg, var(--orange-start), var(--orange-end));
      border: none;
      color: white;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(255, 61, 0, 0.2);
      transition: opacity 0.2s;
    }

    .add-btn:active {
      opacity: 0.7;
    }

    /* MODAL PRINCIPAL */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: white;
      width: 92%;
      max-width: 480px;
      max-height: 90vh;
      border-radius: 32px;
      padding: 24px;
      overflow-y: auto;
      box-shadow: var(--shadow-md);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .close-modal {
      font-size: 28px;
      cursor: pointer;
      color: var(--gray-dark);
    }

    .acai-option {
      background: var(--gray-light);
      border-radius: 20px;
      padding: 16px;
      margin: 12px 0;
    }
    .acai-option h4 { margin-bottom: 12px; color: var(--orange-end); }
    .acai-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px dashed var(--gray-medium);
    }
    .acai-row:last-child { border: none; }
    .acai-row button {
      background: var(--orange-start);
      border: none;
      color: white;
      padding: 4px 16px;
      border-radius: 40px;
      font-weight: 600;
    }

    .recheio-group {
      margin: 20px 0;
      border: 1px solid var(--gray-medium);
      border-radius: 24px;
      padding: 16px;
    }
    .recheio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
    }

    .extras-section {
      background: var(--gray-light);
      border-radius: 16px;
      padding: 16px;
      margin: 16px 0;
    }
    .extra-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px dashed var(--gray-medium);
    }
    .extra-qtd {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .extra-qtd button {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: white;
      font-weight: bold;
      font-size: 1.2rem;
      box-shadow: var(--shadow-sm);
    }

    .modal-footer {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }
    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, var(--orange-start), var(--orange-end));
      border: none;
      color: white;
      font-weight: 700;
      padding: 16px;
      border-radius: 40px;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .btn-secondary {
      background: var(--gray-light);
      border: none;
      padding: 16px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }

    /* CARRINHO DRAWER */
    .cart-drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--white);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.12);
      z-index: 2000;
      transition: transform 0.3s ease;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .cart-drawer.collapsed {
      transform: translateY(calc(100% - 72px));
    }

    .cart-handle {
      padding: 16px;
      text-align: center;
      font-weight: 600;
      background: var(--white);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--gray-medium);
    }

    .cart-items-container {
      overflow-y: auto;
      padding: 16px;
      flex: 1;
    }

    .cart-item {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--gray-light);
    }
    .cart-item-info { flex:1; font-size:0.95rem; }
    .cart-item-actions { display: flex; align-items: center; gap: 8px; }
    .cart-item-actions button {
      background: var(--gray-light);
      border: none;
      width: 30px; height: 30px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1.2rem;
    }

    .cart-total {
      padding: 16px;
      background: var(--gray-light);
      font-weight: 700;
    }
    .checkout-btn {
      background: linear-gradient(135deg, var(--orange-start), var(--orange-end));
      color: white;
      border: none;
      padding: 16px;
      font-size: 1.2rem;
      font-weight: 700;
      width: 100%;
      border-radius: 40px;
      margin-top: 8px;
      cursor: pointer;
    }
    .checkout-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* MODAIS PIX E CHECKOUT (mesmos estilos) */
    .pix-modal, .checkout-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 4000;
    }
    .pix-content, .checkout-form {
      background: white;
      width: 90%;
      max-width: 360px;
      border-radius: 32px;
      padding: 24px;
      text-align: center;
    }
    .checkout-form { max-width: 480px; text-align: left; }
    .pix-code {
      background: var(--gray-light);
      padding: 12px;
      border-radius: 12px;
      font-family: monospace;
      word-break: break-all;
      margin: 16px 0;
    }
    .copy-btn {
      background: var(--black);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
    }
    .form-group { margin-bottom: 16px; }
    .form-group input, select {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--gray-medium);
      border-radius: 40px;
      font-size: 1rem;
    }
    .payment-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0;
    }
    .payment-options label {
      background: var(--gray-light);
      padding: 10px 16px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #trocoField { display: none; margin-top: 8px; }
    .toast {
      position: fixed;
      bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--black);
      color: white;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 5000;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo-wrapper">
      <img src="https://i.pinimg.com/736x/15/ac/c8/15acc8b00600f7f49f899cccbb55050d.jpg" alt="Cantinho do Sabor">
    </div>
  </div>
  <div class="store-info">
    <h1>Cantinho do Sabor</h1>
    <div class="store-tags">
      <span>🍟 Entrega grátis</span>
      <span>⏱️ 40–50 min</span>
      <span>⭐ 4.9</span>
    </div>
  </div>

  <main class="container" id="cardapio"></main>

  <!-- CARRINHO DRAWER -->
  <div class="cart-drawer collapsed" id="cartDrawer">
    <div class="cart-handle" id="cartHandle">
      <span>🛒 Sacola <span id="itemCount">0</span></span>
      <span id="drawerToggle">▲</span>
    </div>
    <div class="cart-items-container" id="cartItems"></div>
    <div class="cart-total">
      <div>Subtotal: R$ <span id="subtotal">0.00</span></div>
      <div>Total: R$ <span id="total">0.00</span></div>
      <button class="checkout-btn" id="checkoutBtn" disabled>Finalizar pedido</button>
    </div>
  </div>

  <!-- MODAL DINÂMICO -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-content" id="modalDynamicContent"></div>
  </div>

  <!-- MODAL PIX -->
  <div class="pix-modal" id="pixModal">
    <div class="pix-content">
      <h3>Pagamento PIX</h3>
      <div class="pix-code">82e5f2e0-772e-46d6-8ec9-3dbcf9b2c54c</div>
      <button class="copy-btn" id="copyPixBtn">Copiar código</button>
    </div>
  </div>

  <!-- MODAL CHECKOUT -->
  <div class="checkout-modal" id="checkoutModal">
    <div class="checkout-form" id="checkoutForm"></div>
  </div>

  <div class="toast" id="toast">Código copiado!</div>

  <script>
    (function() {
      // ---------- BASE DE DADOS ATUALIZADA ----------
      const recheiosDisponiveis = [

      const acompanhamentos = [

      const bebidas = [

      // ---------- CATEGORIA CLÁSSICOS (ATUALIZADA) ----------
      const classicos = [

        { nome: 'O Queridinho!', desc: 'Carne e Queijo', preco: 17.50, img: 'https://i.pinimg.com/736x/0e/ba/e1/0ebae10f386aaf02dda228b58951ce41.jpg' },
        { nome: 'Pastel de Hotdog!', desc: 'Salsicha, Carne e Cheddar', preco: 17.50, img: 'https://i.pinimg.com/736x/f6/ae/90/f6ae90345dc56319aa73d830743edb7f.jpg' },

        { nome: 'Super Cremoso', desc: 'Frango e Requeijão', preco: 18.50, img: 'https://i.pinimg.com/736x/66/20/80/662080576d5755f1fb79d243117a37d8.jpg' },
        { nome: 'Frango Clássico', desc: 'Frango, Catupiry e Milho', preco: 18.50, img: 'https://i.pinimg.com/736x/f4/29/44/f42944f3d798cf35a1e4fb028e62813a.jpg' },
        { nome: 'Cheddar Melt', desc: 'Carne e Cheddar', preco: 18.50, img: 'https://i.pinimg.com/736x/3b/ee/28/3bee28d4d4e562a48782b3c1371d4009.jpg' },

        { nome: 'Frango Gourmet', desc: 'Cream Cheese e Azeitona', preco: 20.00, img: 'https://i.pinimg.com/736x/fb/c8/f4/fbc8f415a71bfb628aed9f182affe245.jpg' },

      // ---------- PRODUTOS BASE (inclui combos, montar, etc) ----------
      let produtosBase = [
        { id: 'dueto', nome: 'Dueto Tradicional', desc: '2 Pastéis de 1 recheio', preco: 22.50, img: 'https://i.pinimg.com/736x/c6/44/0a/c6440adee5ef7fa7d38f1e6e44f28be5.jpg', categoria: '🔥 Combos', tipo: 'dueto', recheiosObr: ['Frango','Carne','Mussarela','Coalho'] },

        { id: 'mini', nome: 'Mini Pastéis Pernambucanos', desc: '6 unidades', preco: 16.50, img: 'https://i.ytimg.com/vi/03C8mGqozSw/hq720.jpg', categoria: '✨ Novidades', tipo: 'classico' }
      ];

      // Adiciona clássicos
      classicos.forEach((c, idx) => {
        produtosBase.push({
          id: `classico-${idx}`,
          nome: c.nome,
          desc: c.desc,
          preco: c.preco,
          img: c.img,
          categoria: '🥟 Clássicos Inesquecíveis',
          tipo: 'classico'
        });
      });

      // Batidinhas de Açaí Gourmet (como itens especiais)
      produtosBase.push({
        id: 'acai-cat',
        nome: '🥣 Batidinhas de Açaí Gourmet',
        desc: '300ml e 500ml - combos',
        preco: 0, // será tratado no modal
        img: 'https://i.pinimg.com/736x/cf/3e/ce/cf3eced59ad15ee6fc1ffb3ebe057cd6.jpg',
        categoria: '🥣 Batidinhas de Açaí Gourmet',
        tipo: 'acai'
      });
